schema_version: config.v1
default_profile: example-model
profiles:
  example-model:
    provider:
      schema_version: provider.v1
      id: example-openai-compatible
      adapter: litellm
      protocol: chat_completions
      litellm_provider: openai
      base_url_env: ABSTRAK_EXAMPLE_BASE_URL
      api_key_env: ABSTRAK_EXAMPLE_API_KEY
      timeout_seconds: 180
      retry:
        max_attempts: 1
      transport:
        stream: false
        candidates: 1
        allow_fallback: false
        allow_cache: false
        drop_unsupported_params: false
    model:
      schema_version: model.v1
      id: example-model
      provider: example-openai-compatible
      api_model: replace-with-exact-api-model-id
      model_id_policy: mutable_alias
      expected_returned_model: null
      interface: chat_completions
      allow_live_probe: false
      generation:
        max_completion_tokens: 128
        temperature: null
        top_p: null
        api_seed: null
        stop: []
        reasoning_effort: null
      output_contract: plain_json
      capabilities:
        usage_reporting: required
        returned_model: required
        system_messages: required
      pricing_ref: null
