  commit: 423217d9fda91e0c2d67e4a43bf62f96f6d104f1
  require_clean_checkout: true
profiles:
  - deepseek-v4-flash
  - deepseek-v4-pro
targets:
  - triton
  - tilelang
  - cute
tasks:
  - level: 1
    problem_id: 1
